apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: payment-service 
spec: 
  replicas: 3 
  strategy: 
    type: RollingUpdate 
    rollingUpdate: 
      maxSurge: 1 
      maxUnavailable: 0 
  selector: 
    matchLabels: 
      app: payment 
  template: 
    metadata: 
      labels: app: payment 
    spec: 
      containers: 
      - name: payment-api 
        image: stefanprodan/podinfo:6.5.4 
        ports: 
        - containerPort: 9898 
        readinessProbe: 
          httpGet: 
            path: /healthz 
            port: 9898
